<script>
  const games = ['Elden Ring', 'Persona 5 Royal', 'DeltaRune', 
                 'Hollow Knight: Silksong', 'Ultrakill', 'NieR: Automata', 'GTA VI', 'Resident Evil: Requiem'];

  const input    = document.querySelector('.search-box input');
  const dropdown = document.getElementById('search-dropdown');

  input.addEventListener('input', () => {
    const q = input.value.toLowerCase();
    const matches = games.filter(g => g.toLowerCase().includes(q));
    dropdown.style.display = matches.length && q ? 'block' : 'none';
    dropdown.innerHTML = matches.map(g =>
      `<div class="search-result" onmousedown="input.value='${g}';dropdown.style.display='none'">${g}</div>`
    ).join('');
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-box')) dropdown.style.display = 'none';
  });
</script>
