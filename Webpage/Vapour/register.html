<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vapour – Create Account</title>
  <link href="register.css" rel="stylesheet">
</head>
<body>

  <!-- LOGO -->
  <div class="logo">
    <a href="Home.html" class="nav-logo">
      <img src="../images/image-removebg-preview.png">
    </a>
  </div>

  <!-- REGISTER CARD -->
  <div class="card">
    <div class="card-title">Create Account</div>
    <div class="card-subtitle">Join Vapour — it's free</div>

    <!-- STEP INDICATOR -->
    <div class="steps">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot pending" id="dot2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot pending" id="dot3">3</div>
    </div>
    <div class="step-labels">
      <span>Account</span>
      <span style="text-align:center">Profile</span>
      <span style="text-align:right">Verify</span>
    </div>

    <!-- STEP 1: ACCOUNT -->
    <div id="step1">
      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="you@example.com" />
          <div class="input-status" id="email-status"></div>
        </div>
      </div>

      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="Choose a username" maxlength="32" />
          <div class="input-status" id="username-status"></div>
        </div>
        <div class="field-hint">Letters, numbers, and underscores only</div>
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password" />
        <div class="strength-bar">
          <div class="strength-seg" id="seg1"></div>
          <div class="strength-seg" id="seg2"></div>
          <div class="strength-seg" id="seg3"></div>
          <div class="strength-seg" id="seg4"></div>
        </div>
        <div class="strength-label" id="strength-label">—</div>
      </div>

      <div class="field" style="margin-bottom:20px;">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm-password" placeholder="Repeat your password" />
          <div class="input-status" id="confirm-status"></div>
        </div>
      </div>

      <button class="btn-primary" onclick="goStep(2)">Continue</button>
    </div>

    <!-- STEP 2: PROFILE -->
    <div id="step2" style="display:none;">
      <div class="row-2">
        <div class="field">
          <label>First Name</label>
          <input type="text" placeholder="First name" />
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" placeholder="Last name" />
        </div>
      </div>

      <div class="field">
        <label>Date of Birth</label>
        <div class="row-2">
          <select>
            <option>Day</option>
            <option>1</option><option>2</option><option>3</option>
            <option>4</option><option>5</option><option>6</option>
            <option>7</option><option>8</option><option>9</option>
            <option>10</option><option>11</option><option>12</option>
            <option>13</option><option>14</option><option>15</option>
            <option>16</option><option>17</option><option>18</option>
            <option>19</option><option>20</option><option>21</option>
            <option>22</option><option>23</option><option>24</option>
            <option>25</option><option>26</option><option>27</option>
            <option>28</option><option>29</option><option>30</option>
            <option>31</option>
          </select>
          <select>
            <option>Month</option>
            <option>January</option><option>February</option>
            <option>March</option><option>April</option>
            <option>May</option><option>June</option>
            <option>July</option><option>August</option>
            <option>September</option><option>October</option>
            <option>November</option><option>December</option>
          </select>
        </div>
        <input type="text" placeholder="Year (e.g. 2000)" maxlength="4" style="margin-top:8px;" />
      </div>

      <div class="field" style="margin-bottom:20px;">
        <label>Country</label>
        <select>
          <option>Select your country</option>
          <option>India</option>
          <option>United States</option>
          <option>United Kingdom</option>
          <option>Germany</option>
          <option>Japan</option>
          <option>Australia</option>
          <option>Canada</option>
          <option>France</option>
          <option>Brazil</option>
        </select>
      </div>

      <div style="display:flex;gap:8px;">
        <button class="btn-secondary" onclick="goStep(1)" style="width:auto;padding:10px 20px;">Back</button>
        <button class="btn-primary" onclick="goStep(3)" style="margin-bottom:0;">Continue</button>
      </div>
    </div>

    <!-- STEP 3: VERIFY -->
    <div id="step3" style="display:none;">
      <div style="text-align:center; padding: 10px 0 24px;">
        <div style="font-size:40px; margin-bottom:14px;">📧</div>
        <div style="font-size:14px; color:var(--white); font-weight:600; margin-bottom:8px;">Check your email</div>
        <div style="font-size:12px; color:var(--dim); line-height:1.7;">
          We sent a verification code to<br>
          <span style="color:var(--accent);" id="email-display">your email</span>
        </div>
      </div>

      <div class="field">
        <label>Verification Code</label>
        <input type="text" placeholder="Enter 6-digit code" maxlength="6"
          style="text-align:center; font-size:20px; letter-spacing:8px; font-family:'Rajdhani',sans-serif; font-weight:700;" />
      </div>

      <div class="checkbox-row" style="margin-top:16px;">
        <input type="checkbox" id="terms" />
        <label for="terms">
          I agree to the <a href="#">Terms of Service</a> and
          <a href="#">Privacy Policy</a>
        </label>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="newsletter" />
        <label for="newsletter">
          Send me news and special offers from Vapour
        </label>
      </div>

      <button class="btn-primary" style="margin-top:8px;" onclick="completeRegister()">Create My Account</button>

      <div style="text-align:center; margin-top:12px; font-size:11px; color:var(--dim);">
        Didn't receive it? <a href="#">Resend code</a>
      </div>

      <div style="display:flex;justify-content:center;margin-top:8px;">
        <button class="btn-secondary" onclick="goStep(2)" style="width:auto;padding:8px 20px;font-size:12px;">Back</button>
      </div>
    </div>

    <!-- SIGN IN LINK -->
    <div class="signin-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>

    <div class="card-footer">
      <a href="#">Privacy Policy</a>
      <span>|</span>
      <a href="#">Terms of Service</a>
      <span>|</span>
      <a href="#">Help</a>
    </div>
  </div>

  <script>
    // ── STEP NAVIGATION ──
    function goStep(n) {
      [1,2,3].forEach(i => {
        document.getElementById('step' + i).style.display = i === n ? 'block' : 'none';
      });
      updateStepUI(n);
      if (n === 3) {
        const email = document.getElementById('email').value;
        document.getElementById('email-display').textContent = email || 'your email';
      }
    }

    function updateStepUI(active) {
      [1,2,3].forEach(i => {
        const dot = document.getElementById('dot' + i);
        dot.className = 'step-dot ' + (i < active ? 'done' : i === active ? 'active' : 'pending');
        dot.textContent = i < active ? '✓' : i;
      });
      [1,2].forEach(i => {
        const line = document.getElementById('line' + i);
        if (line) line.className = 'step-line ' + (i < active ? 'done' : '');
      });
    }

    // ── PASSWORD STRENGTH ──
    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      let score = 0;
      if (val.length >= 8)  score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const segs = ['seg1','seg2','seg3','seg4'];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const classes = ['', 'weak', 'medium', 'medium', 'strong'];

      segs.forEach((id, idx) => {
        const el = document.getElementById(id);
        el.className = 'strength-seg';
        if (idx < score) el.classList.add(classes[score]);
      });
      document.getElementById('strength-label').textContent = val.length ? labels[score] : '—';
    });

    // ── CONFIRM PASSWORD ──
    document.getElementById('confirm-password').addEventListener('input', function() {
      const pw = document.getElementById('password').value;
      const status = document.getElementById('confirm-status');
      if (!this.value) { status.className = 'input-status'; return; }
      status.className = 'input-status show ' + (this.value === pw ? 'ok' : 'err');
      status.textContent = this.value === pw ? '✓' : '✗';
    });

    // ── EMAIL VALIDATION ──
    document.getElementById('email').addEventListener('blur', function() {
      const status = document.getElementById('email-status');
      const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value);
      if (!this.value) { status.className = 'input-status'; return; }
      status.className = 'input-status show ' + (valid ? 'ok' : 'err');
      status.textContent = valid ? '✓' : '✗';
    });

    // ── USERNAME VALIDATION ──
    document.getElementById('username').addEventListener('input', function() {
      const status = document.getElementById('username-status');
      const valid = /^[a-zA-Z0-9_]{3,}$/.test(this.value);
      if (!this.value) { status.className = 'input-status'; return; }
      status.className = 'input-status show ' + (valid ? 'ok' : 'err');
      status.textContent = valid ? '✓' : '✗';
    });

    // ── COMPLETE ──
    function completeRegister() {
      alert('Account created! Welcome to Vapour.');
    }
  </script>

</body>
</html>
